services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: ayurdiet-postgres
    environment:
      POSTGRES_DB: ayurdiet
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres123}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - ayurdiet-network
    restart: unless-stopped

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: ayurdiet-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - ayurdiet-network
    restart: unless-stopped

  # AI Service (Python FastAPI + uv)
  ai-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: ai-service
    container_name: ayurdiet-ai
    env_file: .env
    ports:
      - "5001:5001"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:5001/health').read()",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - ayurdiet-network
    restart: unless-stopped

  # Backend (Express + TypeScript)
  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    container_name: ayurdiet-backend
    environment:
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-postgres123}@postgres:5432/ayurdiet
      REDIS_URL: redis://redis:6379
      AI_SERVICE_URL: http://ai-service:5001
      PORT: 5000
      NODE_ENV: production
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:5000/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s
    networks:
      - ayurdiet-network
    restart: unless-stopped

  # Frontend (React + Vite → Nginx)
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    container_name: ayurdiet-frontend
    ports:
      - "3000:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    networks:
      - ayurdiet-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  ayurdiet-network:
    driver: bridge
